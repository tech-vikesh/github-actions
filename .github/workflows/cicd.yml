# this is name of the worflow that will be displyed in the Actions tab
name: CICD

# Manual click (deliver workflow whenever user needs
on:
  workflow_dispatch:
    inputs:
      enviorment:
       description: This is the enviorment value where this workflow runs
       default: 
       required: true
       type: choice
       options:
        - dev
        - prod
        - staging

jobs:
  # every job needs seperate runner, its called parallelism
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "COde Clone from GitHub"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build Docker Container
        run: echo "Docker container build"
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container"
  deploy:
    if: inputs.enviorment == 'dev'
    needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Docker compose deployed the app"



       
     
       
    
   
